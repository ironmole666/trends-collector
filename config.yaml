# =============================================================================
# TrendsCollector Configuration
# =============================================================================
# Deploy on an overseas VPS. All sources used here are accessible globally
# (no dependency on China mainland services).
#
# Default paths (data_dir, log_dir, db_path) resolve relative to the project
# root if left null. Override them to absolute paths on the deployed VPS.
# =============================================================================

# --- Paths (null = auto-resolve to project root) ---
data_dir: null
log_dir: null
log_level: INFO

# --- Collectors ---
collectors:
  # Google Trends RSS (数据中心 IP 可能返回空，备用可改用网页版)
  google_trends:
    enabled: true
    regions:
      - US
      - GB
      - JP
      - KR
      - CA
      - AU
      - DE
      - FR
      - BR
      - IN

  # Reddit hot posts (数据中心 IP 经常被 403 屏蔽)
  reddit:
    enabled: true
    subreddits:
      - all
      - worldnews
      - technology
      - science
      - programming
      - DataIsBeautiful
    limit: 25

  # Hacker News front page (最稳定，始终可用)
  hackernews:
    enabled: true
    limit: 30

  # GitHub trending repos (改爬 html 页面，无需 API Key，无速率限制)
  github:
    enabled: true
    languages:
      - python
      - javascript
      - go
      - rust
      - typescript

  # Wikipedia 每日热门文章 (免费 REST API，无认证，数据中心友好)
  wikipedia:
    enabled: true
    languages:
      - en
      - ja
      - ko
      - de
      - fr
      - es
      - pt

  # YouTube trending (可选，需 API Key 通过 env YOUTUBE_API_KEY)
  youtube:
    enabled: false
    api_key: ""
    regions:
      - US
      - JP
      - GB

# --- Storage ---
storage:
  db_path: null     # null = <data_dir>/trends.db
  retention_days: 30

# --- Notifications ---
notifications:
  # Telegram bot (可选)
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""

  # Email via SMTP
  email:
    enabled: false
    smtp_host: "smtp.qq.com"
    smtp_port: 465
    smtp_user: "your@email.com"
    smtp_password: ""
    smtp_use_tls: false
    from_addr: "your@email.com"
    to_addrs:
      - "your@email.com"

  # HTTP Email API (for NAT VPS where SMTP ports 465/587 are blocked)
  # Uses SendGrid (free: 100 emails/day via HTTPS API).
  # Sign up: https://sendgrid.com → API Keys → Create API Key
  # Then verify sender email in SendGrid → Settings → Sender Authentication
  # API key also accepts env SENDGRID_API_KEY.
  http_email:
    enabled: false
    api_key: ""             # SendGrid API key
    from_addr: ""           # verified sender email in SendGrid
    to_addrs:               # who receives the emails
      - ""

# --- Relay (China-side relay receiver) ---
relay:
  push_key: ""
